# Lemma Docker Swarm Stack Configuration
# Deploy with: docker stack deploy -c docker-compose.swarm.yml lemma
# This file uses pre-built images from the registry

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lemma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lemma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lemma} -d ${POSTGRES_DB:-lemma}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for BullMQ job queues
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main API Server
  api:
    image: ${API_IMAGE:-ghcr.io/emmanuelirere/lemma/api:latest}
    ports:
      - "4000:4000"
    environment:
      ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemma}
      REDIS_URL: redis://redis:6379
      ALLOWED_API_ORIGINS: ${ALLOWED_API_ORIGINS}
      LEMMA_ENCRYPTION_KEY: ${LEMMA_ENCRYPTION_KEY}
      ADMIN_USER_ID: ${ADMIN_USER_ID}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_URL: ${R2_BUCKET_URL}
      R2_STORAGE_BASE_URL: ${R2_STORAGE_BASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_DOMAIN: ${RESEND_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BASE_URL: ${BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - backend
      - frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.1
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Background Worker
  worker:
    image: ${WORKER_IMAGE:-ghcr.io/emmanuelirere/lemma/worker:latest}
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemma}
      REDIS_URL: redis://redis:6379
      LEMMA_ENCRYPTION_KEY: ${LEMMA_ENCRYPTION_KEY}
      ADMIN_USER_ID: ${ADMIN_USER_ID}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_URL: ${R2_BUCKET_URL}
      R2_STORAGE_BASE_URL: ${R2_STORAGE_BASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_DOMAIN: ${RESEND_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BASE_URL: ${BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - backend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.1
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  backend:
    driver: overlay
    attachable: true
  frontend:
    driver: overlay
    attachable: true
