# fly.toml app configuration file generated for irere-brainos on 2025-07-12T14:21:43+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'irere-brainos'
primary_region = 'jnb'

[build]
  dockerfile = '../docker/api.Dockerfile'
  ignorefile = '../../api/.dockerignore'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
