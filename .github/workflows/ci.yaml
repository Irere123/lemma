name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run biome:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run type check
        run: bun run --filter=@lemma/api typecheck

  build-test:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/api.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: lemma-api:test

      - name: Build Worker image (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/worker.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: lemma-worker:test
