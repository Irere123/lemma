name: CI/CD

on:
  pull_request:
    branches: [staging]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  push:
    branches: [staging]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  ci:
    name: Build & type-check
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Type-check (API + packages)
        run: bunx turbo typecheck --filter='!web'

      # Advisory: pre-existing debt, surfaced as annotations but not blocking.
      - name: Lint & format check (advisory)
        if: ${{ !cancelled() }}
        run: bun run biome:check
        continue-on-error: true
      - name: Type-check web (advisory)
        if: ${{ !cancelled() }}
        run: bunx turbo typecheck --filter=web
        continue-on-error: true

  # Only spin up the deploy(s) that are needed, and only once CI is green.
  changes:
    name: Detect changed apps
    needs: ci
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'bun.lock'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'bun.lock'

  deploy-api:
    name: Deploy API
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Apply D1 migrations
        run: bun run --cwd apps/api migrate:staging

      - name: Deploy
        run: bun run --cwd apps/api deploy:staging

  deploy-web:
    name: Deploy web
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-web
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      # Build from the repo root so Turbo builds workspace deps in order
      # (@lemma/headless -> web). A bare `vite build` would not rebuild
      # @lemma/headless' dist (which is gitignored), so it must go through Turbo.
      - name: Build (web + workspace deps)
        run: bunx turbo build --filter=web

      - name: Deploy
        working-directory: apps/web
        run: bunx wrangler deploy --env staging
