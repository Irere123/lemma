name: Deploy web app

on:
  push:
    branches:
      - staging
    paths:
      - apps/web/**
      - packages/**
      - package.json
      - bun.lock
      - bunfig.toml
      - turbo.json

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build web app from monorepo root
      - name: Build web application
        run: bunx turbo run build --filter=web...
        env:
          VITE_PUBLIC_BACKEND_URL: ${{ secrets.VITE_PUBLIC_BACKEND_URL }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}

      # deploy web app to cloudflare workers
      - name: Deploy web application
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config apps/web/wrangler.jsonc
          packageManager: bun
          wranglerVersion: "4.32.0"

      - name: Print deployment URL
        run: echo "Deployment URL - ${{ steps.deploy.outputs.deployment-url }}"
