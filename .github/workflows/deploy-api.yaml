name: Cloudflare API Deploy
permissions:
  contents: read
on:
  push:
    branches:
      - staging
    paths:
      - apps/api/**
      - packages/**
      - bun.lock

jobs:
  deploy:
    name: Deploy API to Cloudflare Staging
    runs-on: ubuntu-latest
    concurrency: cloudflare-api-staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.2
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/api typecheck
      - run: bun run --cwd apps/api deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
